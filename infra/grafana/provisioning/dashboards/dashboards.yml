# Grafana auto-provisioned dashboard provider.
# Points Grafana to the JSON files in the dashboards directory.

apiVersion: 1

providers:
  - name: 'Sentinel'
    orgId: 1
    folder: 'Sentinel ML Observability'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
