version: "3.9"

# ==============================================================
# Sentinel — local development stack
# Services: postgres, redis, backend, celery-worker, frontend
# ==============================================================

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@postgres:5432/sentinel
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  SECRET_KEY: ${SECRET_KEY:-local-dev-secret-change-in-prod}
  ENVIRONMENT: development
  CORS_ORIGINS: '["http://localhost:3000"]'
  SENTRY_DSN: ${SENTRY_DSN:-}

services:
  # ── Postgres 15 ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── FastAPI backend ────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      <<: *backend-env
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app          # hot-reload in dev
      - model_artifacts:/app/models
      - ../ml:/ml
      - ../scripts:/scripts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ── Celery worker ──────────────────────────────────────────
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes:
      - ../backend:/app
      - model_artifacts:/app/models
      - ../ml:/ml
      - ../scripts:/scripts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 -Q default,drift,shap

  # ── Celery Beat (periodic tasks) ───────────────────────────
  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes:
      - ../backend:/app
      - ../ml:/ml
      - ../scripts:/scripts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    command: celery -A app.tasks.celery_app beat --loglevel=info

  # ── React frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules       # prevent host node_modules override
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_BASE_URL: ws://localhost:8000
    depends_on:
      - backend

  # ── Prometheus ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    depends_on:
      backend:
        condition: service_healthy

  # ── Grafana ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.1
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: sentinel
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/sentinel-dashboard.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/dashboards/sentinel-dashboard.json:/var/lib/grafana/dashboards/sentinel-dashboard.json:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  model_artifacts:
  prometheus_data:
  grafana_data:

